# Translate Module Configuration

# LLM Orchestration
model_name: "gemini-1.5-flash"
prompt_version: "translator_v1"

# Target Languages Mapping (language_code: language_label)
target_languages:
  en: "English"
  ja: "Japanese"

# Runner Execution Policy
execution:
  batch_size: 20                  # Number of source items to process per run
  max_concurrent_requests: 5       # Concurrency limit (asyncio.Semaphore)
  max_retries: 3                  # Retry count limit before logical lock (retry_count >= max_retries)
  backoff_factor: 2.0             # Exponential backoff factor (e.g. 2.0 -> 2s, 4s, 8s)
