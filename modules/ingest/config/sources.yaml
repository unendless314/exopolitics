schema_version: 1
schedule_classes:
  hourly:
    target_interval_minutes: 60
    description: High-signal sources fetched every hour.
  daily:
    target_interval_minutes: 1440
    description: Default cadence for most sources.
  slow:
    target_interval_minutes: 4320
    description: Low-frequency or fragile sources that should be crawled less often.
sanitization_profiles:
  default_html_article:
    input_preference:
      - summary
      - content
    decode_entities: true
    content_selectors: []
    remove_selectors:
      - script
      - style
      - nav
      - footer
    normalize_whitespace: true
    collapse_blank_lines: true
    max_length: 12000
